version: '3.8'

services:
  backend:
    image: buhdockerhub/rentcar-back:latest
    ports:
      - "8080:8080"

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rentcar_db
      MYSQL_USER: rentcar_user
      MYSQL_PASSWORD: rentcar_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: